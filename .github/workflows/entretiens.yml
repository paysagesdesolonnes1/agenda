name: Rappel entretiens à l'année

on:
  schedule:
    - cron: '0 7 * * 1'   # Chaque lundi à 7h UTC (8h heure de Paris)
  workflow_dispatch:        # Permet de lancer manuellement pour tester

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Vérifier les entretiens
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BREVO_KEY:    ${{ secrets.BREVO_KEY }}
          EMAIL_DEST:   ${{ secrets.EMAIL_DEST }}
        run: node .github/scripts/check_entretiens.js
